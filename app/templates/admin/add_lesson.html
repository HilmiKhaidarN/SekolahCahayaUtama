{% extends "base.html" %}
{% block title %}Tambah Materi — {{ school_name }}{% endblock %}

{% block content %}
<div class="app-layout">
  <aside class="sidebar">
    <span class="sidebar__label">Admin</span>
    <a href="{{ url_for('admin.dashboard') }}" class="sidebar__link">Dashboard</a>
    <a href="{{ url_for('admin.manage_users') }}" class="sidebar__link">Kelola Pengguna</a>
    <a href="{{ url_for('admin.manage_lessons') }}" class="sidebar__link active">Kelola Materi</a>
    <span class="sidebar__label" style="margin-top: var(--sp-lg);">Akun</span>
    <a href="{{ url_for('auth.logout') }}" class="sidebar__link">Logout</a>
  </aside>

  <main class="main-content">
    <div style="max-width: 640px;">
      <p class="eyebrow" style="margin-bottom: var(--sp-xs);">Admin Panel</p>
      <h1 class="display-lg" style="margin-bottom: var(--sp-xxl);">Tambah Materi</h1>

      <div class="block block-mint">
        <form method="POST" action="{{ url_for('admin.add_lesson') }}"
              style="display: flex; flex-direction: column; gap: var(--sp-lg);">
          <div class="form-group">
            <label class="form-label" for="title">Judul Materi</label>
            <input class="form-input" type="text" id="title" name="title"
                   placeholder="Contoh: Pengenalan Matematika Dasar" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="subject">Mata Pelajaran</label>
            <input class="form-input" type="text" id="subject" name="subject"
                   placeholder="Contoh: Matematika" required />
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-lg);">
            <div class="form-group">
              <label class="form-label" for="level">Level</label>
              <select class="form-input" id="level" name="level">
                <option value="Dasar">Dasar</option>
                <option value="Menengah">Menengah</option>
                <option value="Lanjutan">Lanjutan</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="description">Deskripsi Singkat</label>
            <textarea class="form-input" id="description" name="description"
                      placeholder="Ringkasan singkat tentang materi ini..." required></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="content">Isi Materi</label>
            <textarea class="form-input" id="content" name="content"
                      style="min-height: 200px;"
                      placeholder="Tulis isi materi lengkap di sini..." required></textarea>
          </div>
          <div style="display: flex; gap: var(--sp-md); flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary">Simpan Materi</button>
            <a href="{{ url_for('admin.manage_lessons') }}" class="btn btn-secondary">Batal</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
{% endblock %}
