{% extends "base.html" %}
{% block title %}Tambah Pengguna — {{ school_name }}{% endblock %}

{% block content %}
<div class="app-layout">
  <aside class="sidebar">
    <span class="sidebar__label">Admin</span>
    <a href="{{ url_for('admin.dashboard') }}" class="sidebar__link">Dashboard</a>
    <a href="{{ url_for('admin.manage_users') }}" class="sidebar__link active">Kelola Pengguna</a>
    <a href="{{ url_for('admin.manage_lessons') }}" class="sidebar__link">Kelola Materi</a>
    <span class="sidebar__label" style="margin-top: var(--sp-lg);">Akun</span>
    <a href="{{ url_for('auth.logout') }}" class="sidebar__link">Logout</a>
  </aside>

  <main class="main-content">
    <div style="max-width: 560px;">
      <p class="eyebrow" style="margin-bottom: var(--sp-xs);">Admin Panel</p>
      <h1 class="display-lg" style="margin-bottom: var(--sp-xxl);">Tambah Pengguna</h1>

      <div class="block block-lilac">
        <form method="POST" action="{{ url_for('admin.add_user') }}"
              style="display: flex; flex-direction: column; gap: var(--sp-lg);">
          <div class="form-group">
            <label class="form-label" for="full_name">Nama Lengkap</label>
            <input class="form-input" type="text" id="full_name" name="full_name"
                   placeholder="Contoh: Budi Santoso" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" type="text" id="username" name="username"
                   placeholder="Contoh: budi.santoso" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" type="email" id="email" name="email"
                   placeholder="Contoh: budi@email.com" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password"
                   placeholder="Minimal 6 karakter" required minlength="6" />
          </div>
          <div class="form-group">
            <label class="form-label" for="role">Role</label>
            <select class="form-input" id="role" name="role">
              <option value="student">Pelajar</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div style="display: flex; gap: var(--sp-md); flex-wrap: wrap;">
            <button type="submit" class="btn btn-primary">Simpan Pengguna</button>
            <a href="{{ url_for('admin.manage_users') }}" class="btn btn-secondary">Batal</a>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
{% endblock %}
