# ============================================================
# k8s-manifests.yaml — Sekolah Cahaya Utama
# Kubernetes Deployment untuk tugas SDG Quality Education
# Berisi: ConfigMap, Deployment, Service, Ingress, HPA
# ============================================================

# ── 1. CONFIGMAP ─────────────────────────────────────────────
# Ubah SCHOOL_NAME di sini untuk ganti judul tanpa rebuild image
# Ini memenuhi kriteria: Konfigurasi via ConfigMap (bobot 35%)
apiVersion: v1
kind: ConfigMap
metadata:
  name: sekolah-config
  labels:
    app: sekolah-cahaya-utama
data:
  SCHOOL_NAME: "Sekolah Cahaya Utama"
  SCHOOL_TAGLINE: "Belajar Cerdas, Berprestasi Gemilang"
  DATABASE_URL: "sqlite:////app/instance/sekolah.db"

---

# ── 2. SECRET ────────────────────────────────────────────────
# Simpan data sensitif terpisah dari ConfigMap
apiVersion: v1
kind: Secret
metadata:
  name: sekolah-secret
  labels:
    app: sekolah-cahaya-utama
type: Opaque
stringData:
  SECRET_KEY: "sekolah-cahaya-utama-k8s-secret-2025"

---

# ── 3. DEPLOYMENT ────────────────────────────────────────────
# Jalankan 2 replicas (Pod) — memenuhi syarat load balancing
# Resource limits wajib ada agar HPA bisa bekerja
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sekolah-cahaya-utama
  labels:
    app: sekolah-cahaya-utama
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sekolah-cahaya-utama
  template:
    metadata:
      labels:
        app: sekolah-cahaya-utama
    spec:
      containers:
        - name: sekolah-cahaya-utama
          image: hilmikhaidarn/sekolah-cahaya-utama:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          # Inject ConfigMap sebagai environment variables
          envFrom:
            - configMapRef:
                name: sekolah-config
            - secretRef:
                name: sekolah-secret
          # Resource limits — WAJIB untuk HPA bisa hitung persentase CPU
          resources:
            requests:
              cpu: "100m"       # 0.1 CPU core minimum
              memory: "128Mi"   # 128 MB RAM minimum
            limits:
              cpu: "300m"       # 0.3 CPU core maksimum
              memory: "256Mi"   # 256 MB RAM maksimum
          # Liveness probe — restart Pod kalau app hang
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          # Readiness probe — Pod hanya terima trafik kalau sudah siap
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          # Mount volume untuk SQLite database
          volumeMounts:
            - name: db-storage
              mountPath: /app/instance
      volumes:
        - name: db-storage
          emptyDir: {}   # Data hilang saat Pod restart — ok untuk demo

---

# ── 4. SERVICE (NodePort) ─────────────────────────────────────
# Expose app ke luar cluster via NodePort
# Kubernetes otomatis load balance trafik ke semua Pod aktif
# Ini memenuhi kriteria: Load Balancing (bobot 35%)
apiVersion: v1
kind: Service
metadata:
  name: sekolah-cahaya-utama-svc
  labels:
    app: sekolah-cahaya-utama
spec:
  type: NodePort
  selector:
    app: sekolah-cahaya-utama
  ports:
    - name: http
      protocol: TCP
      port: 80          # Port di dalam cluster
      targetPort: 5000  # Port di dalam container
      nodePort: 30080   # Port akses dari luar (30000-32767)

---

# ── 5. INGRESS ───────────────────────────────────────────────
# Routing HTTP ke service — memenuhi kriteria Ingress (bobot 35%)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sekolah-cahaya-utama-ingress
  labels:
    app: sekolah-cahaya-utama
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: sekolah.local   # Tambahkan ke /etc/hosts: <minikube ip> sekolah.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sekolah-cahaya-utama-svc
                port:
                  number: 80

---

# ── 6. HPA (Horizontal Pod Autoscaler) ───────────────────────
# Auto-scale saat CPU > 50%, dari 2 Pod hingga maksimal 5 Pod
# Ini memenuhi kriteria: HPA / Skalabilitas (bobot 20%)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sekolah-cahaya-utama-hpa
  labels:
    app: sekolah-cahaya-utama
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sekolah-cahaya-utama
  minReplicas: 2    # Minimal 2 Pod berjalan setiap saat
  maxReplicas: 5    # Maksimal scale up ke 5 Pod
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50  # Scale up kalau CPU rata-rata > 50%
