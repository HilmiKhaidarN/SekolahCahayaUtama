apiVersion: v1
kind: ConfigMap
metadata:
  name: carbon-app-config
data:
  APP_NAME: "Kampus Hijau: SDG Carbon Calculator"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carbon-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: carbon-app
  template:
    metadata:
      labels:
        app: carbon-app
    spec:
      containers:
      - name: carbon-container
        image: username_docker_kamu/sdgs-carbon-app:v1 # <--- GANTI 'username_docker_kamu' dengan username Docker Hub milikmu nanti
        ports:
        - containerPort: 5000
        env:
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: carbon-app-config
              key: APP_NAME
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: carbon-app-service
spec:
  type: NodePort
  selector:
    app: carbon-app
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: carbon-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: carbon-app-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50